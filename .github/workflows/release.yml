# Release on a v* tag push: the shared workflow cross-builds, publishes the
# GitHub Release, and regenerates + pushes the Homebrew formula. To release:
#   git tag vX.Y.Z && git push origin vX.Y.Z
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    uses: shhac/homebrew-tap/.github/workflows/go-release.yml@main
    permissions:
      contents: write
    secrets: inherit
    with:
      name: agent-mcp-host
      desc: "One-origin MCP host for the agent-* CLI family"
      formula_class: AgentMcpHost
      help_match: "MCP host"
      # license: deliberately not pinned — the shared workflow detects
      # LicenseRef-PolyForm-Perimeter-1.0.0 from this repo's LICENSE file.
